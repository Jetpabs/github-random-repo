<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Random Repository Search</title>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>
<body>
    <main>
        <h1>Github Repository Finder</h1>

        <div id="input-container">

            <div id="input-field">
                <input type="text" list="language-list" id="repo-input" placeholder="Enter programming language">
                <button id="search-button"><i class="fa-solid fa-magnifying-glass"></i></button>
            </div>

            <div id="results" class="hidden">
            </div>
        </div>
        
        <div id="output-container">
            <article id="repo-container">
                <h2 id="placeholder" >Please select a language</h2>
                
                <div id="repo-output" class="hidden">
                    <span id="repo-header">
                        <h2 id="repo-name">driver.js</h2>
                        <a id="repo-link" href="#" target="_blank"><i class="fa-solid fa-arrow-up-right-from-square"></i></a>
                    </span>
                    
                    <p id="repo-desc">A light-we.ght. no-dependency, vanilla JavaScript
                        engine to drive user's focus across the page.</p>

                    <div id="repo-stats">
                        <span id="repo-lang">JavaScript</span>

                        <span class="temp">
                            <i class="fa-solid fa-star"></i>
                            <span id="repo-stars">24,422</span>
                        </span>

                        <span class="temp">
                            <i class="fa-solid fa-code-fork"></i>
                            <span id="repo-forks">1,071</span>
                        </span>

                        <span class="temp">
                            <i class="fa-solid fa-eye"></i>
                            <span id="repo-watch">120</span>
                        </span>
                        
                    </div>

                </div>
                
            </article>

            <button id="refresh" class="hidden">Refresh</button>
        </div>
    </main>

</body>

<script src="script.js"></script>
</html>
